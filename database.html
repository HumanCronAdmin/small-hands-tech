<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product Database - SmallHandsTech</title>
<meta name="description" content="Browse and filter 50+ tech products for small hands. Mice, keyboards, pens, and tools with hand size ranges, weights, and prices.">
<meta property="og:title" content="Product Database - SmallHandsTech">
<meta property="og:description" content="Browse and filter 50+ tech products for small hands. Mice, keyboards, pens, and tools with hand size ranges, weights, and prices.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://humancronadmin.github.io/small-hands-tech/database.html">
<link rel="canonical" href="https://humancronadmin.github.io/small-hands-tech/database.html">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-brand">Small<span>Hands</span></a>
  <div class="nav-links">
    <a href="database.html" class="active">Database</a>
    <a href="#">Guides</a>
    <a href="#">About</a>
  </div>
</nav>

<div class="db-header">
  <h1>Product Database</h1>
  <p>Every product measured and rated for small hands. Filter, sort, and find your fit.</p>
</div>

<div class="filters">
  <select id="filterCat" aria-label="Filter by category">
    <option value="">All Categories</option>
    <option value="mouse">Mice</option>
    <option value="keyboard">Keyboards</option>
    <option value="pen">Pens</option>
    <option value="tool">Tools</option>
  </select>
  <select id="sortBy" aria-label="Sort products">
    <option value="name">Sort: Name</option>
    <option value="price-asc">Sort: Price (low)</option>
    <option value="price-desc">Sort: Price (high)</option>
    <option value="weight-asc">Sort: Weight (light)</option>
    <option value="weight-desc">Sort: Weight (heavy)</option>
  </select>
  <input type="search" id="searchBox" placeholder="Search by name or brand..." aria-label="Search products">
</div>

<div class="result-count" id="resultCount"></div>
<div class="product-grid" id="productGrid"></div>
<div class="no-results" id="noResults" style="display:none">No products match your filters. Try adjusting your search.</div>

<footer class="footer">
  <p>SmallHandsTech. Built for hands that never fit the standard.</p>
</footer>

<script src="js/database.js"></script>
</body>
</html>
